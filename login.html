<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.login-box{
background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

.login-btn{
width:100%;
padding:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.login-btn:hover{
background:#1b5e20;
}

.register{
margin-top:15px;
font-size:14px;
}

.register a{
color:#2e7d32;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Welcome Back</h2>
<p>Sign in to your account</p>

<!-- ✅ FIXED FORM -->
<form onsubmit="loginUser(event)">

<input type="email" id="loginEmail" placeholder="Email" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button class="login-btn">Login →</button>

</form>

<div class="register">
New customer? <a href="signup.html">Register here</a>
</div>

</div>

</body>

</html>
