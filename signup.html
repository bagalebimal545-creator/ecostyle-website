<!DOCTYPE html>
<html>

<head>

<title>Create Account</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>

</head>

<body>

<h1>Create New Account</h1>

<a href="login.html">Back to Login</a>

<form onsubmit="registerUser(event)">

<label>Full Name</label><br>
<input type="text" id="name" placeholder="Enter Full Name" required><br><br>

<label>Email</label><br>
<input type="email" id="email" placeholder="Enter Email" required><br><br>

<label>Username</label><br>
<input type="text" id="username" placeholder="Choose Username" required><br><br>

<label>Password</label><br>
<input type="password" id="password" placeholder="Create Password" required><br><br>

<label>Confirm Password</label><br>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required><br><br>

<button type="submit">Create Account</button>

</form>

</body>

</html>
